<form
  hx-post="/edit/{{ todo.id }}/"
  hx-target="closest article"
  hx-swap="outerHTML"
  class="flex items-center px-6 py-3"
>
  <input
    class="flex-1 mr-4 px-3 py-2 border rounded-md text-sm focus:outline-none focus:ring-2 focus:ring-cyan-500"
    type="text"
    name="title"
    value="{{ todo.title }}"
    autofocus
  />

  <button class="text-cyan-600 hover:text-cyan-900 font-medium">Save</button>
</form>
